name: Noida-Daily-Check

# GLOBAL FORCE - This must be at the very top level
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '15 9 * * *'    
    - cron: '30 14,15,16 * * *' 
  workflow_dispatch: 

jobs:
  check-weather:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Run Monitor
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: |
          pip install requests
          python monitor.py
