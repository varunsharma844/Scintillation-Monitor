name: Noida-Daily-Check

on:
  schedule:
    - cron: '15 9 * * *'    # 14:45 IST
    - cron: '30 14,15,16 * * *' # 20:00-22:00 IST
  workflow_dispatch: 

jobs:
  check-weather:
    runs-on: ubuntu-latest
    steps:
      # Updated to v4.1.7+ / v4.2.0 which natively supports Node 24
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          sparse-checkout: .

      # Updated to v5.1.1+ which natively runs on Node 24
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      # Run your monitor script
      - name: Run Monitor
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: |
          pip install requests
          python monitor.py
